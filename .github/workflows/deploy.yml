name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one production deploy at a time; do not cancel in-flight deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          path: web
          # Pin Node explicitly. web/package.json engines require >=22.12.0;
          # 24 matches the withastro/action default documented by Astro.
          node-version: 24
          # Package manager: leave unset so withastro/action auto-detects from
          # the lockfile under web/ (bun.lock or bun.lockb — bun is expected).

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
