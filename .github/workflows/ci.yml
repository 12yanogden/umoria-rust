name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# ncurses 6.x generates constants via a build-time initscr() probe, which
# requires a valid TERM (jeaye/ncurses-rs#221). GitHub Actions has none.
env:
  TERM: xterm

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ncurses
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev pkg-config
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -Dwarnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ncurses
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev cmake pkg-config
      - name: Install pyte (transcript screen renderer)
        run: pip3 install --user pyte
      - name: Build C++ reference
        run: tools/capture/build_ref.sh
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - name: RefCell nest anti-pattern scan
        run: bash scripts/check_refcell_nests.sh

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ncurses
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev pkg-config
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ncurses
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev pkg-config
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.80.0"
      - run: cargo check --all-features

  differential:
    name: Differential (ignored)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install ncurses
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev cmake pkg-config
      - name: Install pyte (transcript screen renderer)
        run: pip3 install --user pyte
      - name: Build C++ reference
        run: tools/capture/build_ref.sh
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Run ignored differential tests
        run: cargo test -- --ignored
      - name: Run differential_live feature tests
        run: cargo test --features differential_live -- --ignored
