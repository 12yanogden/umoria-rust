name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ncurses
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev cmake pkg-config

      - name: Build C++ reference
        run: tools/capture/build_ref.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  differential:
    name: Differential (ignored)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install ncurses
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev cmake pkg-config

      - name: Build C++ reference
        run: tools/capture/build_ref.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      - name: Run ignored differential tests
        run: cargo test -- --ignored

      - name: Run differential_live feature tests
        run: cargo test --features differential_live -- --ignored
