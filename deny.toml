[graph]
all-features = false

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "LGPL-2.1",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-or-later",
]

[advisories]
yanked = "warn"
# Intentional / unavoidable for this port:
# - ncurses 6.0.1 mirrors the C++ UI FFI; the crate is archived with no safe upgrade.
# - serial is a transitive dep of portable-pty (dev-only differential harness).
ignore = [
    { id = "RUSTSEC-2025-0108", reason = "ncurses-rs is the intentional FFI mirror of C++ ui_io; crate archived, no safe upgrade" },
    { id = "RUSTSEC-2019-0006", reason = "ncurses-rs FFI mirror; same archived crate, no safe upgrade" },
    { id = "RUSTSEC-2017-0008", reason = "transitive via portable-pty (dev-only); no maintained path without replacing the PTY harness" },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
